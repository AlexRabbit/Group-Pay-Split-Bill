<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050805">
  <meta name="description" content="Split restaurant bills between friends — no math at the table.">
  <title>Group Pay — Split Bill</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css">
</head>
<body>
  <div class="crt-glow" aria-hidden="true"></div>

  <div class="app-shell">
    <header class="top-bar hidden" id="topBar">
      <span class="logo">GROUP_PAY v1</span>
      <span class="bill-pill" id="billPill">$0.00</span>
      <div class="top-actions">
        <button type="button" class="btn-icon btn-howto" id="btnHowTo" aria-label="How to use">?</button>
        <button type="button" class="btn-icon" id="btnShare" aria-label="Copy share link" title="Copy link">⎘</button>
      </div>
    </header>

    <main class="main-stage" id="mainStage">
      <!-- Step 0: Bill total -->
      <section class="step-panel active" id="stepBill" data-step="bill">
        <h1 class="step-title" id="titleBill">&gt; BILL_TOTAL</h1>
        <p class="step-hint" id="hintBill">Enter the full amount on the receipt.</p>
        <div class="terminal-box">
          <input type="number" inputmode="decimal" step="0.01" min="0" class="bill-input" id="inputBill" placeholder="0.00" autocomplete="off">
        </div>
      </section>

      <!-- Step 1: Names -->
      <section class="step-panel" id="stepNames" data-step="names">
        <h2 class="step-title" id="titleNames">&gt; PAYERS</h2>
        <p class="step-hint" id="hintNames">Names separated by commas.</p>
        <div class="terminal-box">
          <textarea id="inputNames" placeholder="Alex, Carlos, Cesar, Manuel" rows="3"></textarea>
        </div>
      </section>

      <!-- Step 2: Per-payer items -->
      <section class="step-panel" id="stepItems" data-step="items">
        <div class="progress-dots" id="progressDots" aria-hidden="true"></div>
        <div class="payer-header">
          <span class="payer-name" id="currentPayerName">—</span>
          <span class="payer-total" id="currentPayerTotal">$0.00</span>
        </div>
        <p class="step-hint" id="hintItems">Add what this person ordered.</p>

        <ul class="item-list" id="itemList"></ul>

        <div class="terminal-box">
          <div class="item-row">
            <input type="text" id="inputItemName" placeholder="item name" autocomplete="off">
            <input type="number" inputmode="decimal" step="0.01" min="0" id="inputItemPrice" placeholder="0.00">
          </div>
          <div class="split-row" id="splitPartners"></div>
          <button type="button" class="btn-secondary" id="btnAddItem" style="width:100%;margin-top:10px">ADD ITEM</button>
        </div>
      </section>

      <!-- Step 3: Summary -->
      <section class="step-panel" id="stepSummary" data-step="summary">
        <h2 class="step-title" id="titleSummary">&gt; RECONCILE</h2>
        <div class="reconcile" id="reconcileBox"></div>
        <div class="summary-card">
          <h3 id="labelEachOwes">Each person owes</h3>
          <div id="summaryRows"></div>
        </div>
        <div class="terminal-box" style="margin-top:12px">
          <p class="step-hint" style="margin-bottom:8px">Backup / restore session</p>
          <div class="action-bar-inner" style="position:static;padding:0;border:none;background:none">
            <button type="button" class="btn-secondary" id="btnExport">EXPORT</button>
            <button type="button" class="btn-secondary" id="btnImport">IMPORT</button>
          </div>
          <input type="file" id="inputImport" accept=".json,application/json" class="hidden">
        </div>
      </section>
    </main>

    <footer class="action-bar">
      <div class="action-bar-inner">
        <button type="button" class="btn-secondary hidden" id="btnBack">BACK</button>
        <button type="button" class="btn-primary" id="btnAction">CONFIRM</button>
      </div>
    </footer>
  </div>

  <div class="error-toast hidden" id="errorToast" role="alert"></div>
  <div class="info-toast hidden" id="infoToast" role="status"></div>

  <script src="js/split-engine.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>
  <script src="js/tour.js"></script>
</body>
</html>
